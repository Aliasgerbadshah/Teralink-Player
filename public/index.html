<!DOCTYPE html>
<html lang=\"en\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>TeraBox Streamer Pro</title>
    <link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap\" rel=\"stylesheet\">
    <link rel=\"stylesheet\" href=\"style.css\">
</head>
<body>
    <div class=\"ambient-background\">
        <div class=\"blob purp-blob\"></div>
        <div class=\"blob blue-blob\"></div>
    </div>

    <main class=\"app-container\">
        <header class=\"hero\">
            <h1 class=\"title\">TeraBox<span class=\"accent\">Streamer</span></h1>
            <p class=\"subtitle\">Seamless, ad-free streaming. Just paste your link below.</p>
        </header>

        <form id=\"streamForm\" class=\"glass-form\">
            <div class=\"input-wrapper\">
                <input type=\"url\" id=\"teraboxLink\" placeholder=\"e.g., https://teraboxapp.com/s/1xxxx\" required autocomplete=\"off\">
                <button type=\"submit\" class=\"play-btn\">
                    <svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"currentColor\" width=\"24\" height=\"24\">
                        <path d=\"M8 5v14l11-7z\"/>
                    </svg>
                    Play
                </button>
            </div>
        </form>

        <div id=\"statusArea\">
            <div id=\"loadingState\" class=\"hidden\">
                <div class=\"loader\"></div>
                <p>Establishing secure connection...</p>
            </div>
            
            <div id=\"errorState\" class=\"hidden error-box\">
                <!-- Error text will be injected here -->
            </div>
        </div>

        <div id=\"playerWrapper\" class=\"hidden\">
            <div class=\"glass-player\">
                <video id=\"teraboxPlayer\" controls autoplay controlsList=\"nodownload\" width=\"100%\" height=\"100%\" style=\"outline:none; position:absolute; top:0; left:0;\">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div style=\"margin-top: 1rem; text-align: center;\">
                <a id=\"downloadBtn\" href=\"#\" target=\"_blank\" class=\"play-btn\" style=\"display: inline-flex; text-decoration: none; font-size: 0.9rem; padding: 0.5rem 1rem;\">Download Source Video</a>
            </div>
        </div>
    </main>

    <script src=\"https://cdn.jsdelivr.net/npm/hls.js@latest\"></script>
    <script src=\"script.js\"></script>
</body>
</html>
